<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #ff4444;
            text-align: center;
        }
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        select, input {
            background-color: #333;
            color: white;
            border: 2px solid #ff0000;
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #ff4444;
        }
        .kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background-color: #1e1e1e;
            border: 2px solid #ff0000;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(255,0,0,0.2);
        }
        .card h3 {
            margin: 0 0 10px 0;
            color: #ff4444;
        }
        .kpi-value {
            font-size: 2em;
            font-weight: bold;
            color: #ffffff;
        }
        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        canvas {
            background-color: #1e1e1e;
            border: 2px solid #ff0000;
            border-radius: 10px;
            padding: 10px;
        }
        .table-container {
            background-color: #1e1e1e;
            border: 2px solid #ff0000;
            border-radius: 10px;
            padding: 20px;
            overflow-x: auto;
        }
        #tableSearch {
            width: 100%;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1e1e1e;
        }
        th, td {
            border: 1px solid #ff0000;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #333;
            color: #ff4444;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background-color: #2a2a2a;
        }
        tr:hover {
            background-color: #ff000033;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sales Dashboard</h1>
        <div class="filters">
            <select id="regionFilter">
                <option value="">All Regions</option>
            </select>
            <select id="productFilter">
                <option value="">All Products</option>
            </select>
            <input type="text" id="tableSearch" placeholder="Search table...">
        </div>
        <div class="kpis">
            <div class="card">
                <h3>Total Revenue</h3>
                <div class="kpi-value" id="totalRevenue">$0</div>
            </div>
            <div class="card">
                <h3>Total Orders</h3>
                <div class="kpi-value" id="totalOrders">0</div>
            </div>
            <div class="card">
                <h3>Avg Order Value</h3>
                <div class="kpi-value" id="avgOrderValue">$0</div>
            </div>
            <div class="card">
                <h3>Unique Products</h3>
                <div class="kpi-value" id="uniqueProducts">0</div>
            </div>
        </div>
        <div class="charts">
            <canvas id="productChart"></canvas>
            <canvas id="timeChart"></canvas>
        </div>
        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Region</th>
                        <th>Product</th>
                        <th>Sales</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script>
        const rawData = [
            {date: '2024-01', region: 'North', product: 'Laptop', sales: 1200},
            {date: '2024-02', region: 'North', product: 'Laptop', sales: 1300},
            {date: '2024-03', region: 'North', product: 'Laptop', sales: 1100},
            {date: '2024-04', region: 'North', product: 'Laptop', sales: 1400},
            {date: '2024-01', region: 'North', product: 'Phone', sales: 800},
            {date: '2024-02', region: 'North', product: 'Phone', sales: 850},
            {date: '2024-03', region: 'North', product: 'Phone', sales: 900},
            {date: '2024-01', region: 'South', product: 'Phone', sales: 900},
            {date: '2024-02', region: 'South', product: 'Phone', sales: 950},
            {date: '2024-03', region: 'South', product: 'Phone', sales: 1000},
            {date: '2024-04', region: 'South', product: 'Phone', sales: 920},
            {date: '2024-01', region: 'South', product: 'Tablet', sales: 700},
            {date: '2024-02', region: 'South', product: 'Tablet', sales: 750},
            {date: '2024-03', region: 'South', product: 'Tablet', sales: 800},
            {date: '2024-01', region: 'East', product: 'Tablet', sales: 600},
            {date: '2024-02', region: 'East', product: 'Tablet', sales: 650},
            {date: '2024-03', region: 'East', product: 'Tablet', sales: 700},
            {date: '2024-04', region: 'East', product: 'Tablet', sales: 680},
            {date: '2024-01', region: 'East', product: 'Desktop', sales: 1500},
            {date: '2024-02', region: 'East', product: 'Desktop', sales: 1600},
            {date: '2024-03', region: 'East', product: 'Desktop', sales: 1550},
            {date: '2024-01', region: 'West', product: 'Desktop', sales: 1400},
            {date: '2024-02', region: 'West', product: 'Desktop', sales: 1450},
            {date: '2024-05', region: 'West', product: 'Desktop', sales: 1500},
            {date: '2024-06', region: 'West', product: 'Desktop', sales: 1550},
            {date: '2024-01', region: 'West', product: 'Laptop', sales: 1250},
            {date: '2024-02', region: 'West', product: 'Laptop', sales: 1280},
            {date: '2024-06', region: 'West', product: 'Laptop', sales: 1350}
        ];

        let filteredData = rawData;
        let searchTerm = '';

        let productChart, timeChart;

        function getUniqueValues(array, key, filterFn = () => true) {
            return [...new Set(array.filter(filterFn).map(item => item[key]))].sort();
        }

        function updateProductFilter() {
            const regionSelect = document.getElementById('regionFilter');
            const region = regionSelect.value;
            const filterFn = region ? (row => row.region === region) : () => true;
            const products = getUniqueValues(rawData, 'product', filterFn);
            const productSelect = document.getElementById('productFilter');
            productSelect.innerHTML = '<option value="">All Products</option>';
            products.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p;
                opt.textContent = p;
                productSelect.appendChild(opt);
            });
            // Reset product if not available
            if (productSelect.value && !products.includes(productSelect.value)) {
                productSelect.value = '';
            }
        }

        function filterData() {
            const region = document.getElementById('regionFilter').value;
            const product = document.getElementById('productFilter').value;
            filteredData = rawData.filter(row =>
                (!region || row.region === region) &&
                (!product || row.product === product)
            );
            updateKPIs();
            updateCharts();
            updateTable();
        }

        function updateKPIs() {
            const totalRev = filteredData.reduce((sum, row) => sum + row.sales, 0);
            const totalOrders = filteredData.length;
            const avgOrder = totalOrders ? (totalRev / totalOrders).toFixed(2) : 0;
            const uniqueProd = new Set(filteredData.map(row => row.product)).size;

            document.getElementById('totalRevenue').textContent = '$' + totalRev.toLocaleString();
            document.getElementById('totalOrders').textContent = totalOrders.toLocaleString();
            document.getElementById('avgOrderValue').textContent = '$' + avgOrder;
            document.getElementById('uniqueProducts').textContent = uniqueProd;
        }

        function updateCharts() {
            // Product chart
            const productAgg = {};
            filteredData.forEach(row => {
                productAgg[row.product] = (productAgg[row.product] || 0) + row.sales;
            });
            const productLabels = Object.keys(productAgg).sort();
            const productValues = productLabels.map(p => productAgg[p]);
            productChart.data.labels = productLabels;
            productChart.data.datasets[0].data = productValues;
            productChart.update();

            // Time chart
            const timeAgg = {};
            filteredData.forEach(row => {
                timeAgg[row.date] = (timeAgg[row.date] || 0) + row.sales;
            });
            const timeLabels = Object.keys(timeAgg).sort();
            const timeValues = timeLabels.map(d => timeAgg[d]);
            timeChart.data.labels = timeLabels;
            timeChart.data.datasets[0].data = timeValues;
            timeChart.update();
        }

        function updateTable() {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';
            const displayData = filteredData.filter(row => {
                const rowText = `${row.date} ${row.region} ${row.product} ${row.sales}`.toLowerCase();
                return rowText.includes(searchTerm.toLowerCase());
            });
            displayData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.date}</td>
                    <td>${row.region}</td>
                    <td>${row.product}</td>
                    <td>${row.sales.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function init() {
            // Init region filter
            const regionSelect = document.getElementById('regionFilter');
            const regions = getUniqueValues(rawData, 'region');
            regionSelect.innerHTML = '<option value="">All Regions</option>';
            regions.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r;
                opt.textContent = r;
                regionSelect.appendChild(opt);
            });

            // Init product filter
            updateProductFilter();

            // Init charts
            const productCtx = document.getElementById('productChart').getContext('2d');
            productChart = new Chart(productCtx, {
                type: 'bar',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Sales by Product',
                        data: [],
                        backgroundColor: '#ff4444',
                        borderColor: '#ff0000',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: 'white' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'white' },
                            grid: { color: '#444' }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: { color: 'white' },
                            grid: { color: '#444' }
                        }
                    }
                }
            });

            const timeCtx = document.getElementById('timeChart').getContext('2d');
            timeChart = new Chart(timeCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Sales Over Time',
                        data: [],
                        borderColor: '#4444ff',
                        backgroundColor: 'rgba(68, 68, 255, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            labels: { color: 'white' }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'white' },
                            grid: { color: '#444' }
                        },
                        y: {
                            beginAtZero: true,
                            ticks: { color: 'white' },
                            grid: { color: '#444' }
                        }
                    }
                }
            });

            // Event listeners
            document.getElementById('regionFilter').addEventListener('change', () => {
                updateProductFilter();
                document.getElementById('productFilter').value = '';
                filterData();
            });
            document.getElementById('productFilter').addEventListener('change', filterData);
            document.getElementById('tableSearch').addEventListener('input', () => {
                searchTerm = document.getElementById('tableSearch').value;
                updateTable();
            });

            // Initial load
            filterData();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
