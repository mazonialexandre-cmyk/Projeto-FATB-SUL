<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Gerencial</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { font-family: 'Segoe UI', Arial; background:#0b0b0b; color:white; margin:0; }

header {
    background:black;
    padding:15px;
    display:flex;
    align-items:center;
    border-bottom:3px solid red;
}

header img { height:45px; margin-right:10px; }

.container { padding:20px; }

.card {
    background:#111;
    padding:15px;
    margin-bottom:20px;
    border-radius:12px;
}

.filters { display:flex; flex-wrap:wrap; gap:15px; }

.filter-box { display:flex; flex-direction:column; }

.filter-box label { font-size:12px; color:#aaa; }

.filter-box select {
    padding:6px;
    background:#1a1a1a;
    color:white;
    border:1px solid #333;
    border-radius:6px;
    min-width:150px;
}

select option:disabled {
    color:#555;
}

button {
    background:red;
    color:white;
    border:none;
    padding:8px 12px;
    cursor:pointer;
    border-radius:6px;
}

.kpis { display:flex; gap:15px; }

.kpi {
    flex:1;
    background:#1a1a1a;
    padding:15px;
    border-left:4px solid red;
}

.kpi span { font-size:20px; font-weight:bold; }

canvas { max-height:300px; }

.search-box input {
    width:100%;
    padding:8px;
    background:#1a1a1a;
    border:1px solid #333;
    color:white;
    border-radius:6px;
}

.table-container {
    max-height:400px;
    overflow:auto;
}

table { width:100%; border-collapse: collapse; font-size:12px; }

th {
    position:sticky;
    top:0;
    background:#900;
    padding:8px;
    cursor:pointer;
}

td { padding:6px; border-bottom:1px solid #222; }

tr:hover { background:#1a1a1a; }

</style>
</head>

<body>

<header>
    <img src="logo.png">
    <h2>Dashboard Gerencial</h2>
</header>

<div class="container">

<div class="card">
    <input type="file" id="fileInput">
</div>

<div class="card kpis">
    <div class="kpi">Total<br><span id="total"></span></div>
    <div class="kpi">Filtradas<br><span id="filtradas"></span></div>
</div>

<div class="card">
    <div id="filtros" class="filters"></div>
    <br>
    <button onclick="limparFiltros()">Limpar Filtros</button>
</div>

<div class="card"><canvas id="graficoTotal"></canvas></div>
<div class="card"><canvas id="graficoFiltrado"></canvas></div>

<div class="card">

<div class="search-box">
<input type="text" id="search" placeholder="Buscar..." onkeyup="buscar()">
</div>

<button onclick="exportarExcel()">Exportar Excel</button>

<div class="table-container">
<table id="tabela"></table>
</div>

</div>

</div>

<script>

let dados = [];
let filtrados = [];
let dadosBusca = [];
let ordemAsc = true;

document.getElementById('fileInput').addEventListener('change', e => {
    Papa.parse(e.target.files[0], {
        header:true,
        complete: res => {
            dados = res.data.filter(d => Object.keys(d).length > 1);
            filtrados = [...dados];
            dadosBusca = [...dados];
            criarFiltros();
            atualizar();
        }
    });
});

/* ================= FILTROS ================= */

function criarFiltros(){
    let div = document.getElementById('filtros');
    div.innerHTML = "";

    Object.keys(dados[0]).forEach(col => {
        let box = document.createElement("div");
        box.className = "filter-box";

        let label = document.createElement("label");
        label.innerText = col;

        let select = document.createElement("select");
        select.multiple = true;
        select.id = "f_" + col;

        select.addEventListener("change", filtrar);

        box.appendChild(label);
        box.appendChild(select);
        div.appendChild(box);
    });

    atualizarFiltros();
}

function filtrar(){
    filtrados = dados.filter(linha => {
        return Object.keys(linha).every(col => {
            let sel = document.getElementById("f_" + col);
            let valores = Array.from(sel.selectedOptions).map(o => o.value);
            return valores.length === 0 || valores.includes(linha[col]);
        });
    });

    atualizarFiltros();
    dadosBusca = [...filtrados];
    atualizar();
}

function atualizarFiltros(){
    Object.keys(dados[0]).forEach(col => {

        let select = document.getElementById("f_" + col);
        let selecionados = Array.from(select.selectedOptions).map(o => o.value);

        let base = dados.filter(linha => {
            return Object.keys(linha).every(c => {
                if(c === col) return true;

                let sel = document.getElementById("f_" + c);
                let vals = Array.from(sel.selectedOptions).map(o => o.value);

                return vals.length === 0 || vals.includes(linha[c]);
            });
        });

        let contagem = {};
        base.forEach(l => {
            let v = l[col];
            if(v) contagem[v] = (contagem[v]||0)+1;
        });

        let todosValores = [...new Set(dados.map(d => d[col]).filter(v => v))];

        select.innerHTML = "";

        todosValores.forEach(v => {
            let opt = document.createElement("option");
            let count = contagem[v] || 0;

            opt.value = v;
            opt.text = `${v} (${count})`;

            if(count === 0){
                opt.disabled = true;
            }

            if(selecionados.includes(v)){
                opt.selected = true;
            }

            select.appendChild(opt);
        });
    });
}

function limparFiltros(){
    document.querySelectorAll("select").forEach(s => s.selectedIndex = -1);
    filtrados = [...dados];
    dadosBusca = [...dados];
    atualizarFiltros();
    atualizar();
}

/* ================= BUSCA ================= */

function buscar(){
    let termo = document.getElementById('search').value.toLowerCase();

    dadosBusca = filtrados.filter(l =>
        Object.values(l).some(v =>
            v && v.toLowerCase().includes(termo)
        )
    );

    tabela();
}

/* ================= TABELA ================= */

function ordenar(col){
    dadosBusca.sort((a,b)=>{
        return ordemAsc
            ? (a[col] > b[col] ? 1 : -1)
            : (a[col] < b[col] ? 1 : -1);
    });

    ordemAsc = !ordemAsc;
    tabela();
}

function tabela(){
    let t = document.getElementById('tabela');
    t.innerHTML="";

    if(dadosBusca.length === 0) return;

    let head="<tr>";
    Object.keys(dadosBusca[0]).forEach(k=>head+=`<th onclick="ordenar('${k}')">${k}</th>`);
    head+="</tr>";
    t.innerHTML+=head;

    dadosBusca.forEach(l=>{
        let row="<tr>";
        Object.values(l).forEach(v=>row+=`<td>${v}</td>`);
        row+="</tr>";
        t.innerHTML+=row;
    });
}

/* ================= EXPORT ================= */

function exportarExcel(){
    let ws = XLSX.utils.json_to_sheet(dadosBusca);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Dados");
    XLSX.writeFile(wb, "dados_filtrados.xlsx");
}

/* ================= DASHBOARD ================= */

function atualizar(){
    total.innerText = dados.length;
    filtradas.innerText = filtrados.length;
    tabela();
    graficoTotalFunc();
    graficoFiltradoFunc();
}

let chartTotal, chartFiltrado;

function contar(base){
    let cont = {};
    base.forEach(d=>{
        cont[d.status] = (cont[d.status]||0)+1;
    });
    return cont;
}

function graficoTotalFunc(){
    let cont = contar(dados);

    if(chartTotal) chartTotal.destroy();

    chartTotal = new Chart(graficoTotal, {
        type:'bar',
        data:{
            labels:Object.keys(cont),
            datasets:[{
                data:Object.values(cont),
                backgroundColor:'red'
            }]
        }
    });
}

function graficoFiltradoFunc(){
    let cont = contar(filtrados);

    if(chartFiltrado) chartFiltrado.destroy();

    chartFiltrado = new Chart(graficoFiltrado, {
        type:'bar',
        data:{
            labels:Object.keys(cont),
            datasets:[{
                data:Object.values(cont),
                backgroundColor:'red'
            }]
        }
    });
}

</script>

</body>
</html>
