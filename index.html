<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV Parser with PapaParse</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <h1>CSV File Parser</h1>
    <input type="file" id="csvFile" accept=".csv,text/csv">
    <div id="output"></div>

    <script>
        document.getElementById('csvFile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) {
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const csvText = e.target.result;
                const delimiter = Papa.detectDelimiter(csvText);
                console.log(`Detected delimiter: ${delimiter}`);

                Papa.parse(csvText, {
                    delimiter: delimiter,
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        if (results.errors.length > 0) {
                            console.error('Parse errors:', results.errors);
                            document.getElementById('output').innerHTML = '<p>Errors occurred while parsing the CSV.</p>';
                            return;
                        }

                        let tableHTML = `
                            <table border="1" style="border-collapse: collapse;">
                                <thead>
                                    <tr>
                                        ${results.meta.fields.map(field => `<th style="padding: 8px; background-color: #f2f2f2;">${field}</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                                    ${results.data.map(row => `
                                        <tr>
                                            ${Object.values(row).map(value => `<td style="padding: 8px;">${value ?? ''}</td>`).join('')}
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;

                        document.getElementById('output').innerHTML = `
                            <p>Parsed ${results.data.length} rows successfully.</p>
                            ${tableHTML}
                        `;
                    },
                    error: function(error) {
                        console.error('PapaParse error:', error);
                        document.getElementById('output').innerHTML = '<p>An error occurred while parsing the CSV.</p>';
                    }
                });
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
