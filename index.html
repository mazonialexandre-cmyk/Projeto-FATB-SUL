<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard with Cascading Filters</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ff4444;
        }
        #fileInput {
            background: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 10px;
            margin-bottom: 20px;
        }
        #filters {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        #filters > div {
            display: flex;
            flex-direction: column;
        }
        label {
            color: #ff4444;
            font-weight: bold;
            margin-bottom: 5px;
        }
        select {
            background: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 8px;
            border-radius: 4px;
        }
        #chart {
            background: #222;
            margin-bottom: 20px;
            border-radius: 8px;
            padding: 20px;
        }
        #table {
            overflow-x: auto;
        }
        #table table {
            width: 100%;
            border-collapse: collapse;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            border: 1px solid #444;
            padding: 12px;
            text-align: left;
        }
        th {
            background: #333;
            color: #ff4444;
            font-weight: bold;
        }
        tr:nth-child(even) {
            background: #2a2a2a;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard com Filtros Automáticos</h1>
        <input type="file" id="fileInput" accept=".csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel">
        <div id="filters"></div>
        <canvas id="chart" width="800" height="400"></canvas>
        <div id="table"></div>
    </div>

    <script>
        let data = [];
        let filteredData = [];
        let filters = {};
        let chart = null;

        document.getElementById('fileInput').addEventListener('change', handleFile);

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            if (file.name.match(/\.csv$/i)) {
                reader.readAsText(file);
                reader.onload = function(e) {
                    Papa.parse(e.target.result, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            data = results.data.filter(row => Object.values(row).some(v => v !== '' && v != null));
                            filteredData = [...data];
                            initDashboard();
                        }
                    });
                };
            } else {
                reader.readAsArrayBuffer(file);
                reader.onload = function(e) {
                    const ab = new Uint8Array(e.target.result);
                    const wb = XLSX.read(ab, { type: 'array' });
                    const wsname = wb.SheetNames[0];
                    const ws = wb.Sheets[wsname];
                    const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
                    if (json.length > 0) {
                        const headers = json[0];
                        data = json.slice(1).map(row => {
                            const obj = {};
                            headers.forEach((h, i) => {
                                obj[h] = row[i];
                            });
                            return obj;
                        }).filter(row => Object.values(row).some(v => v !== '' && v != null));
                        filteredData = [...data];
                        initDashboard();
                    }
                };
            }
        }

        function initDashboard() {
            filters = {};
            criarFiltros();
            updateChart();
            updateTable();
        }

        function criarFiltros() {
            const container = document.getElementById('filters');
            container.innerHTML = '';
            if (filteredData.length === 0 || Object.keys(filteredData[0] || {}).length === 0) {
                return;
            }
            const columns = Object.keys(filteredData[0]);
            columns.forEach(col => {
                const div = document.createElement('div');
                div.style.minWidth = '200px';
                div.innerHTML = `
                    <label>${col}:</label>
                    <select id="filter_${col}">
                        <option value="">Todos</option>
                    </select>
                `;
                container.appendChild(div);
                const select = document.getElementById(`filter_${col}`);
                const uniqueValues = [...new Set(filteredData.map(row => row[col]).filter(v => v !== '' && v != null))].sort();
                uniqueValues.forEach(val => {
                    const option = document.createElement('option');
                    option.value = val;
                    option.textContent = val;
                    select.appendChild(option);
                });
                if (filters[col]) {
                    select.value = filters[col];
                }
                select.addEventListener('change', onFilterChange);
            });
        }

        function onFilterChange(event) {
            const col = event.target.id.replace('filter_', '');
            filters[col] = event.target.value || null;
            applyFilters();
        }

        function applyFilters() {
            filteredData = data.filter(row => {
                return Object.entries(filters).every(([col, value]) => !value || row[col] === value);
            });
            criarFiltros();
            updateChart();
            updateTable();
        }

        function updateChart() {
            const canvas = document.getElementById('chart');
            const ctx = canvas.getContext('2d');
            if (filteredData.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#444';
                ctx.textAlign = 'center';
                ctx.fillText('No data to display', canvas.width / 2, canvas.height / 2);
                if (chart) {
                    chart.destroy();
                    chart = null;
                }
                return;
            }
            if (Object.keys(filteredData[0] || {}).length === 0) return;

            const cols = Object.keys(filteredData[0]);
            const labelCol = cols.find(c => typeof filteredData[0][c] === 'string' || filteredData[0][c] === '') || cols[0];
            const numCols = cols.filter(c => {
                const val = filteredData[0][c];
                return !isNaN(parseFloat(val)) && isFinite(val) && val !== '';
            });
            const numCol = numCols[0] || cols[cols.length - 1];

            const agg = {};
            filteredData.forEach(row => {
                const label = row[labelCol] || 'Unknown';
                const val = parseFloat(row[numCol]) || 0;
                agg[label] = (agg[label] || 0) + val;
            });

            const labels = Object.keys(agg);
            const values = Object.values(agg);

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `Total ${numCol}`,
                        data: values,
                        backgroundColor: 'rgba(255, 68, 68, 0.8)',
                        borderColor: '#ff4444',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { color: '#fff' },
                            grid: { color: '#444' }
                        },
                        x: {
                            ticks: { color: '#fff' },
                            grid: { color: '#444' }
                        }
                    },
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    }
                }
            });
        }

        function updateTable() {
            const tableDiv = document.getElementById('table');
            if (filteredData.length === 0) {
                tableDiv.innerHTML = '<div class="no-data">No data matches the filters</div>';
                return;
            }
            if (Object.keys(filteredData[0] || {}).length === 0) {
                tableDiv.innerHTML = '<div class="no-data">No data</div>';
                return;
            }

            const cols = Object.keys(filteredData[0]);
            let html = '<table><thead><tr>';
            cols.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += '</tr></thead><tbody>';

            filteredData.slice(0, 100).forEach(row => {
                html += '<tr>';
                cols.forEach(col => {
                    html += `<td>${row[col] || ''}</td>`;
                });
                html += '</tr';
            });

            if (filteredData.length > 100) {
                html += '<tr><td colspan="' + cols.length + '" style="text-align:center;">... and ' + (filteredData.length - 100) + ' more rows</td></tr>';
            }

            html += '</tbody></table>';
            tableDiv.innerHTML = html;
        }
    </script>
</body>
</html>
